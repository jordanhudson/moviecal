version: 2
updates:
  # npm dependencies — Puppeteer (ships Chromium) especially accrues CVEs.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch routine version bumps into one PR to cut review noise; security
      # updates still come through as their own PRs.
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Keep the Actions in .github/workflows pinned to current versions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
